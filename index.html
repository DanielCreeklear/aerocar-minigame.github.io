<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>AeroCarGame</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="ui-layer">
      <h1 id="status-text"></h1>
    </div>

    <div id="mobile-controls" aria-label="Controles mobile">
      <button id="control-left" class="control-btn" type="button">ESQ</button>
      <button id="control-right" class="control-btn" type="button">DIR</button>
      <button
        id="control-boost"
        class="control-btn control-btn-boost"
        type="button"
      >
        BOOST
      </button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module" src="main.js"></script>
  </body>
</html>
